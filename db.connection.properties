# Azure SQL connection settings
# Do not commit real secrets. Keep password in a local override file or environment variable.

# Environment selector (DEV or PROD)
app.env=DEV

# Azure SQL base connection parameters
db.host=avio-sqlserver.database.windows.net
db.port=1433
db.name=LB-sql-db
db.schema=dbo
db.user=Svc_LB_App
db.password=${DB_PASSWORD}

# SQL Server JDBC options
db.encrypt=true
db.trustServerCertificate=false
db.hostNameInCertificate=*.database.windows.net
db.loginTimeout=30

# Full JDBC URL template
db.jdbcUrl=jdbc:sqlserver://avio-sqlserver.database.windows.net:1433;database=LB-sql-db;user=Svc_LB_App;password=${DB_PASSWORD};encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;

# Table naming conventions (same DB, env-specific prefixes)
db.tablePrefix.dev=DEV
db.tablePrefix.prod=PROD
db.transactionLogTable.dev=dbo.DEV_TRANSACTION_LOG
db.transactionLogTable.prod=dbo.PROD_TRANSACTION_LOG
